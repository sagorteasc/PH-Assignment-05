<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* font */
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');

        .geist {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="geist">
    <main class="bg-[#F8FAFC]">
        <div class="flex flex-col justify-center items-center min-h-screen">
            <fieldset class="fieldset bg-white border-white rounded-box w-xs border p-8">
                <div class="space-y-2 flex flex-col items-center mb-6">
                    <img src="assets/github-logo.png" alt="">
                    <h3 class="font-semibold text-2xl text-[#1F2937]">GitHub Issues Tracker</h3>
                    <h5 class="text-[#64748B]">Sign in to manage your issues</h5>
                </div>
                <label class="label font-medium text-[#1F2937]">Username</label>
                <input id="input-id" type="text" class="input text-[#64748B]" placeholder="Enter Username" required />
                <p class="text-sm text-[#4A00FF]">Default: admin</p>

                <label class="label font-medium text-[#1F2937]">Password</label>
                <input id="input-pass" type="password" class="input text-[#64748B]" placeholder="Enter Password"
                    required />
                <p class="text-sm text-[#4A00FF]">Default: admin123</p>

                <button id="sign-in" class="btn btn-primary mt-4">Sign In</button>

                <div class="flex justify-center items-center gap-1 my-5">
                    <hr class="w-1/2 text-[#E4E4E7]">
                    <p class="text-[#1F2937]">OR</p>
                    <hr class="w-1/2 text-[#E4E4E7]">
                </div>

                <div class="text-center space-y-2">
                    <p class="text-sm text-[#64748B]">Demo Credentials:</p>
                    <div>
                        <p class="text-[#1F2937]"><span class="font-semibold">Username:</span> admin</p>
                        <p class="text-[#1F2937]"><span class="font-semibold">Password:</span> admin123</p>
                    </div>
                </div>
            </fieldset>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>

</html>
