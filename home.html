<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/130209f2ad.js" crossorigin="anonymous"></script>
    <style>
        /* font */
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');

        .geist {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="geist bg-[#F8FAFC] min-h-screen">
    <header>
        <!-- navbar section -->
        <nav class="py-4 bg-white border-b-2 border-[#E9E9E9] mb-10 md:mb-14">
            <div class="max-w-[1600px] mx-auto w-11/12 md:flex md:justify-between md:items-center lg:w-full">
                <div class="flex justify-center items-center gap-1 mb-5 md:mb-0 md:justify-normal">
                    <img class="w-10 h-10" src="assets/github-logo.png" alt="">
                    <h3>GitHub Issues Tracker</h3>
                </div>
                <div class="flex gap-4">
                    <div>
                        <label class="input validator join-item">
                            <div class="flex items-center justify-center gap-1 text-[#64748B]">
                                <i class="fa-brands fa-sistrix"></i><input type="text" placeholder="Search issues..."
                                    required />
                            </div>
                        </label>
                    </div>
                    <button class="btn btn-primary font-semibold join-item">
                        <i class="fa-solid fa-plus" ;"></i>
                        New Issue
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="">
        <section class="max-w-[1110px] mx-auto w-11/12 lg:w-full">

            <!-- buttons -->
            <div class="bg-white p-6 drop-shadow-sm mb-4 rounded-lg">
                <button class="btn mr-2 btn-primary">All</button>
                <button class="btn mr-2">Open</button>
                <button class="btn">Closed</button>
            </div>

            <!-- issues count -->
            <div
                class="flex flex-col bg-white p-6 drop-shadow-sm mb-4 rounded-lg md:flex-row md:justify-between md:items-center">

                <!-- issues text -->
                <div class="flex gap-2 items-center mb-2 md:mb-0">
                    <div class="bg-[#ECE4FF] rounded-full w-10 h-10 flex items-center justify-center">
                        <img class="w-8 h-8" src="assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h3 class="font-semibold text-xl text-[#1F2937]">50 Issues</h3>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <!-- issues status -->
                <div class="flex gap-4 justify-between md:justify-normal">
                    <h4 class="font-medium text-[#1F2937]"><i class="fa-solid fa-circle"
                            style="color: rgb(99, 230, 190);"></i> Open</h4>
                    <h4 class="font-medium text-[#1F2937]"><i class="fa-solid fa-circle"
                            style="color: rgb(177, 151, 252);"></i> Closed</h4>
                </div>
            </div>

            <!-- issues -->
            <div class="bg-[#FBFBFB] shadow-lg rounded-md p-3 md:p-5">
                <div id="issues" class="grid grid-cols-1 gap-3 md:gap-4 md:grid-cols-2 lg:grid-cols-4"></div>
            </div>
        </section>

        <!-- modal section -->
        <section>
            <!-- <dialog id="issue-detail" class="modal">
                <div id="modal-container" class="modal-box">
                </div>
            </dialog> -->

            <!-- Open the modal using ID.showModal() method -->
            <dialog id="issue-detail" class="modal">
                <div class="modal-box">
                    <div id="modal-container"></div>
                    <div class="modal-action">
                        <form method="dialog">
                            <button class="btn btn-primary">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </section>
    </main>

    <script src="js/issues.js"></script>
    <script src="js/modal.js"></script>
</body>

</html>
